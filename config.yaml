# =========================================================================
#  house-finder configuration
#  Edit this file to change WHAT gets collected and HOW it's ranked.
#  Nothing here requires touching code. Restart the app to apply changes.
# =========================================================================

# What to collect ----------------------------------------------------------
search:
  deal_type: sale            # sale | rent
  cities: [Helsinki, Espoo, Vantaa]   # add/remove capital-region cities here
  # Optional coarse pre-filters applied at the source when supported.
  # These reduce how much we fetch; fine ranking still happens via `criteria`.
  price_max: 400000
  size_min_m2: 100
  rooms_min: 4
  # Public-transport travel-time enrichment (needs DIGITRANSIT_KEY env var).
  # When true, the collector routes each listing to city center + airport and
  # stores the minutes so the `travel_time` criterion can filter on them.
  enrich_transit: true

# YOUR commute destinations (needs DIGITRANSIT_KEY) -------------------------
# Each home is routed to every destination by public transport; the page shows
# the door-to-door minutes and lets you sort by each. Give lat/lon (exact) or an
# `address` (geocoded for you). Add/rename freely — new ones route on next run.
# The two defaults (center/airport) match what's already stored; keep or edit.
commute:
  destinations:
    - { name: center,   lat: 60.1719, lon: 24.9414 }        # Helsinki Central (shown as "City centre")
    - { name: Tietotie, address: "Tietotie 9, Espoo" }       # wife's work (Otaniemi, West Metro)
    - { name: airport,  lat: 60.3172, lon: 24.9633 }         # Helsinki-Vantaa (info only)

sources:
  # Live scrapers (working). Flip mock on for offline/demo use.
  mock:     { enabled: false }
  etuovi:   { enabled: true, max_pages: 40 }   # per house type; adapter stops at the real last page
  oikotie:  { enabled: true, building_types: [1, 2, 4, 32, 64] }  # +kerrostalo (kept only if duplex)

# How often to refresh listings (detect new / delisted) --------------------
schedule:
  interval_hours: 6

# Ranking + requirements ---------------------------------------------------
# Each block name maps to a registered Criterion `key`. To add a new one:
#   1. write a Criterion subclass with a unique key (see core/criteria/builtins.py)
#   2. add a block here with its settings
criteria:

  # --- HARD REQUIREMENTS (a listing failing these is dropped) -------------
  sauna:
    require_private: true
    on_unknown: keep         # keep|exclude when the source doesn't say

  balcony_glazed:
    on_unknown_glazing: keep # keep|exclude when glazing isn't stated

  budget:
    max_price: 400000        # hard ceiling — over this is excluded
    on_unknown: keep

  min_size:
    min_m2: 95               # hard floor — smaller is excluded (eased from 100)
    on_unknown: keep

  ownership_sanity:          # drop asumisoikeus / osaomistus (not full purchase)
    min_price_per_m2: 1500   # no real Helsinki house sells below this €/m²
    on_unknown: keep

  listing_complete:          # must be a real home for sale — not a plot / office / stub
    require: [size, price]   # any of these missing -> excluded (a home always states both)

  property_type:             # ONLY real residential homes — offices, commercial
    allowed: [omakotitalo, rivitalo, paritalo, erillistalo, kerrostalo]
    on_unknown: exclude      # premises & plots arrive with an unmapped/empty type -> drop them

  bedrooms:                  # bedrooms excl. living room (derives rooms-1)
    min: 3
    max: 5
    on_unknown: keep

  duplex:                    # two-floor / maisonette home
    required: true
    on_unknown: keep

  toilets:                   # was a hard 2-toilet rule; now soft — see toilets_pref
    min: 1                    # only excludes a confirmed zero-toilet home
    on_unknown: keep

  parking_min:               # deal-breaker is ONLY an open spot with a heating pole
    allowed: [garage, hall, covered, own_spot, open]   # roofed / dedicated / plain spot ok
    on_unknown: keep         # excludes only confirmed open_pole / none


  built_after:               # newer than 1970 (eased from 1975)
    year: 1970
    on_unknown: keep

  station_distance:          # within 1.5 km of a station (eased from 1 km) — the
    max_km: 1.5              # commute-TIME ranking below is the real proximity test
    on_unknown: keep

  # --- RANKING PREFERENCES (weights are relative; tune freely) ------------
  # Parking is important and transit is really preferred -> higher weights.
  # Price / size / rooms are equal baseline.
  parking:
    weight: 4
    scores:
      garage: 1.0
      hall: 0.9
      covered: 0.7
      own_spot: 0.55        # dedicated own spot (oma autopaikka) — a positive
      open_pole: 0.4
      open: 0.15
      none: 0.0

  transit:                   # closeness to a metro / commuter-train station
    weight: 4
    near_km: 0.6             # <=600 m from a station -> full marks
    far_km: 2.5             # >=2.5 km -> 0
    # stations: []          # optional; defaults to Helsinki metro + rail list

  travel_time:               # PREFERENCE: fast transit to BOTH daily commutes (needs DIGITRANSIT_KEY)
    weight: 4                 # bumped: this is your real "near good transport" test
    good_minutes: 30         # <=30 min -> full marks
    bad_minutes: 60          # >=60 min -> 0
    destinations: [center, Tietotie]   # your + your wife's commutes (airport excluded — not daily)
    aggregate: worst         # score on the SLOWER of the two, so a home must be fast to both

  toilets_pref:              # prefer 2+ toilets (the softened 2-toilet want)
    weight: 1
    target: 2

  own_land:                  # PRIORITY TIER: own-plot houses rank above leased ones
    priority: true           # all own-land above all leased, regardless of score
    scores:
      own: 1.0
      optional_rental: 0.4
      rented: 0.0
    # (to hard-exclude leased plots instead, remove this and add a filter — see git history)

  price:
    weight: 2
    ideal_price: 300000
    max_budget: 400000

  size:
    weight: 2
    min_m2: 100
    target_m2: 130

  rooms:
    weight: 2
    min_rooms: 4
    target_rooms: 6

  # price_per_m2 available too (add a block with weight/good/bad to enable)

# Notifications ------------------------------------------------------------
notify:
  email:
    enabled: true
    to: ""                    # set NOTIFY_TO in .env / Actions secret (keeps it out of a public repo)
    on: top5_new_entry        # notify when a listing rises into the top 5
    top_n: 5

# Web UI -------------------------------------------------------------------
web:
  title: "Helsinki House Leaderboard"
  public_url: "https://sromic1990.github.io/house-finder/"   # used for the email button
  show_excluded: false        # add a tab listing rejected properties + reasons
