services:
  web:
    build: .
    command: uvicorn web.app:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - db-data:/app/db
    restart: unless-stopped

  collector:
    build: .
    command: python -m collector.run          # loops on schedule.interval_hours
    env_file:
      - .env                                   # GMAIL_USER, GMAIL_APP_PASSWORD
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - db-data:/app/db
    restart: unless-stopped

volumes:
  db-data:
